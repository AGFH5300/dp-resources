name: Apply PDF search readiness fix

on:
  push:
    branches:
      - fix/pdf-search-readiness-and-inputs

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/pdf-search-readiness-and-inputs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/apply-pdf-search-readiness-fix.py
      - run: |
          rm scripts/apply-pdf-search-readiness-fix.py
          rm .github/workflows/apply-pdf-search-readiness-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/resource/'[fileId]'/pdf-viewer.tsx scripts/apply-pdf-search-readiness-fix.py .github/workflows/apply-pdf-search-readiness-fix.yml
          git commit -m "Fix PDF search readiness and toolbar inputs"
          git push origin HEAD:fix/pdf-search-readiness-and-inputs

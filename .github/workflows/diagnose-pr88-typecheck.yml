name: Diagnose PR 88 typecheck

on:
  push:
    branches:
      - fix/pdf-search-readiness-and-inputs

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/pdf-search-readiness-and-inputs
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: |
          set +e
          npm run typecheck > /tmp/typecheck.txt 2>&1
          status=$?
          grep -n -E "error TS|Type error|Failed to compile" /tmp/typecheck.txt > pr88-typecheck-diagnostic.txt || true
          echo "exit_status=$status" >> pr88-typecheck-diagnostic.txt
      - run: |
          rm .github/workflows/diagnose-pr88-typecheck.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr88-typecheck-diagnostic.txt .github/workflows/diagnose-pr88-typecheck.yml
          git commit -m "Capture PR 88 typecheck diagnostic"
          git push origin HEAD:fix/pdf-search-readiness-and-inputs

name: Apply PDF viewer feedback fix

on:
  push:
    branches:
      - fix/pdf-viewer-scroll-stability

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pdf-viewer-scroll-stability
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/apply-pdf-viewer-feedback-fix.py
      - run: |
          rm scripts/apply-pdf-viewer-feedback-fix.py
          rm .github/workflows/apply-pdf-viewer-feedback-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/resource/'[fileId]'/pdf-viewer.tsx tests/pdf-progressive-loader.test.ts scripts/apply-pdf-viewer-feedback-fix.py .github/workflows/apply-pdf-viewer-feedback-fix.yml
          git commit -m "Stabilize PDF navigation and highlight search results"
          git push origin HEAD:fix/pdf-viewer-scroll-stability

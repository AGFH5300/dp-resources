name: Fix PR 88 typecheck

on:
  push:
    branches:
      - fix/pdf-search-readiness-and-inputs

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/pdf-search-readiness-and-inputs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/fix-pr88-typecheck.py
      - run: |
          rm scripts/fix-pr88-typecheck.py
          rm .github/workflows/fix-pr88-typecheck.yml
          rm -f pr88-typecheck-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/resource/'[fileId]'/pdf-viewer.tsx scripts/fix-pr88-typecheck.py .github/workflows/fix-pr88-typecheck.yml
          git add -u pr88-typecheck-diagnostic.txt || true
          git commit -m "Fix live PDF search readiness typecheck"
          git push origin HEAD:fix/pdf-search-readiness-and-inputs

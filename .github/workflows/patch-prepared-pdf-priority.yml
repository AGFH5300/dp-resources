name: Patch prepared PDF priority

on:
  push:
    branches:
      - fix/prepared-pdf-priority

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/prepared-pdf-priority
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/patch-prepared-pdf-priority.py
      - run: |
          rm scripts/patch-prepared-pdf-priority.py
          rm .github/workflows/patch-prepared-pdf-priority.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/resource/'[fileId]'/pdf-session/route.ts app/resource/'[fileId]'/pdf-viewer.tsx lib/pdf-preview-derivatives.ts tests/standard-pdf-fallback.test.ts
          git add -u scripts/patch-prepared-pdf-priority.py .github/workflows/patch-prepared-pdf-priority.yml
          git commit -m "Preserve prepared PDF reader priority"
          git push origin HEAD:fix/prepared-pdf-priority

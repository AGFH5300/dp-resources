name: Finalize exact PDF search tests

on:
  push:
    branches:
      - feat/pdf-exact-search-highlights-v2

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pdf-exact-search-highlights-v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/finalize-exact-pdf-search-tests.py
      - run: |
          rm scripts/finalize-exact-pdf-search-tests.py
          rm .github/workflows/finalize-exact-pdf-search-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/pdf-progressive-loader.test.ts exact-pdf-search-typecheck.txt scripts/finalize-exact-pdf-search-tests.py .github/workflows/finalize-exact-pdf-search-tests.yml
          git commit -m "Test exact PDF word and phrase highlighting"
          git push origin HEAD:feat/pdf-exact-search-highlights-v2

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  production-pestle-import:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/pestle-question-bank-import'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: question-bank-pestle-production-import
      cancel-in-progress: true
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_PDF_PREVIEW_BUCKET: ${{ secrets.R2_PDF_PREVIEW_BUCKET }}
      QUESTION_BANK_STORAGE_PROVIDER: r2
      CAPTURE_PATH: /tmp/pestle-audited-capture
      DRY_RUN_REPORT: /tmp/pestle-dry-run.json
      IMPORT_REPORT: /tmp/pestle-import.json
      EXPECTED_ARCHIVE_FINGERPRINT: dc73a9e9d00d0b230e9e8e36ee8904ebccae61774614601eff38d5d738d8ae1a
    steps:
      - name: Check out reviewed importer
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$R2_ACCOUNT_ID" || test -n "$R2_ENDPOINT"
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_PDF_PREVIEW_BUCKET"
      - name: Capture live PESTLE source
        shell: bash
        run: |
          set -uo pipefail
          set +e
          node --max-old-space-size=6144 scripts/question-bank/capture-pestle.mjs \
            --output "$CAPTURE_PATH" \
            --bank-concurrency 4 \
            --asset-concurrency 12
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            exit "$status"
          fi
      - name: Verify exact authorized source and assets
        shell: bash
        run: |
          set -euo pipefail
          cd "$CAPTURE_PATH"
          sha256sum --check --strict --quiet checksums.sha256
          awk '($0 ~ /  raw\/banks\/.*\.json$/ && $0 !~ /\.source\.json$/) || $0 ~ /  assets\/(embedded|linked)\// || $0 ~ /  index\/(asset-occurrences|asset-failures)\.ndjson$/ || $0 ~ /  index\/bank-summary\.json$/' \
            checksums.sha256 > /tmp/pestle-filtered-manifest.sha256
          authorization="$GITHUB_WORKSPACE/scripts/question-bank/pestle-authorized.json"
          expected_entries="$(node -e "process.stdout.write(String(require(process.argv[1]).entries))" "$authorization")"
          expected_manifest_sha="$(node -e "process.stdout.write(require(process.argv[1]).filteredManifestSha256)" "$authorization")"
          test "$(wc -l < /tmp/pestle-filtered-manifest.sha256)" -eq "$expected_entries"
          printf '%s  %s\n' \
            "$expected_manifest_sha" \
            /tmp/pestle-filtered-manifest.sha256 |
            sha256sum --check --strict
      - name: Verify private R2 request path
        run: |
          node --input-type=module <<'NODE'
          import { randomUUID } from 'node:crypto';
          import {
            deletePrivateR2Object,
            getPrivateR2Object,
            putPrivateR2Object,
          } from './scripts/r2-s3.mjs';
          const key = `question-bank/preflight/${randomUUID()}.txt`;
          const signal = () => AbortSignal.timeout(30000);
          let uploaded = false;
          try {
            await putPrivateR2Object({
              bucket: process.env.R2_PDF_PREVIEW_BUCKET,
              key,
              body: Buffer.from('dp-question-bank-pestle-preflight'),
              contentType: 'text/plain',
              signal: signal(),
            });
            uploaded = true;
            const response = await getPrivateR2Object({
              bucket: process.env.R2_PDF_PREVIEW_BUCKET,
              key,
              signal: signal(),
            });
            if (!response.ok || (await response.text()) !== 'dp-question-bank-pestle-preflight') {
              throw new Error('R2 preflight read verification failed.');
            }
          } finally {
            if (uploaded) await deletePrivateR2Object({
              bucket: process.env.R2_PDF_PREVIEW_BUCKET,
              key,
              signal: signal(),
            });
          }
          NODE
      - name: Normalize without production writes
        run: >-
          node --max-old-space-size=6144 scripts/import-pestle-question-bank.mjs
          --capture "$CAPTURE_PATH"
          --mode dry-run
          --storage-provider r2
          --storage-bucket "$R2_PDF_PREVIEW_BUCKET"
          --report "$DRY_RUN_REPORT"
      - name: Enforce reviewed PESTLE fingerprint and counts
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const report = JSON.parse(await readFile(process.env.DRY_RUN_REPORT, 'utf8'));
          if (report.productionWritePerformed !== false) {
            throw new Error('Dry run unexpectedly performed a production write.');
          }
          if (report.verificationStatus !== 'passed') {
            throw new Error('PESTLE source verification did not pass.');
          }
          if (report.archiveSha256 !== process.env.EXPECTED_ARCHIVE_FINGERPRINT) {
            throw new Error('PESTLE content fingerprint differs from the reviewed capture.');
          }
          const expected = {
            sourceRecords: 10721,
            uniqueSubjectQuestionIds: 10484,
            overlappingRows: 237,
            quarantinedQuestions: 2,
            importableQuestions: 10482,
            subjects: 14,
            courses: 34,
            topics: 425,
            subtopics: 3010,
            variants: 13291,
            storedPlacementRows: 17555,
            assetOccurrences: 7492,
            referencedContentDeduplicatedAssets: 6427,
            variantAssetAssociations: 11023,
          };
          for (const [key, value] of Object.entries(expected)) {
            if (report.actualCounts?.[key] !== value) {
              throw new Error(`Count mismatch for ${key}: expected ${value}, received ${report.actualCounts?.[key]}`);
            }
          }
          NODE
      - name: Append database rows and private assets
        run: >-
          node --max-old-space-size=6144 scripts/import-pestle-question-bank.mjs
          --capture "$CAPTURE_PATH"
          --mode all
          --storage-provider r2
          --storage-bucket "$R2_PDF_PREVIEW_BUCKET"
          --workers 10
          --batch-size 250
          --confirm-production
          --report "$IMPORT_REPORT"
      - name: Verify completed PESTLE import
        run: |
          node --input-type=module <<'NODE'
          import { appendFile, readFile } from 'node:fs/promises';
          const report = JSON.parse(await readFile(process.env.IMPORT_REPORT, 'utf8'));
          if (report.productionWritePerformed !== true) {
            throw new Error('Importer did not record its production write.');
          }
          if (report.databaseVerification?.status !== 'passed') {
            throw new Error('Scoped production verification failed.');
          }
          if (report.assetUpload?.failed !== 0) {
            throw new Error('One or more PESTLE assets failed verification.');
          }
          if (report.assetUpload?.uploaded + report.assetUpload?.skippedVerified !== 6427) {
            throw new Error('Verified PESTLE asset total does not equal 6,427.');
          }
          await appendFile(process.env.GITHUB_STEP_SUMMARY, [
            '## Production PESTLE question-bank import',
            '',
            '- Exact capture manifest: passed',
            '- Scoped database verification: passed',
            '- Imported question cores: 10,482',
            '- Course/topic variants: 13,291',
            '- Stored placements: 17,555',
            '- Verified referenced assets: 6,427',
            '- Quarantined Physics questions: 2',
            '',
          ].join('\n'));
          NODE
      - name: Remove runner-local capture
        if: always()
        shell: bash
        run: |
          rm -rf "${CAPTURE_PATH:?}"
          rm -f "$DRY_RUN_REPORT" "$IMPORT_REPORT" /tmp/pestle-filtered-manifest.sha256

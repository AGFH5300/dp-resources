name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  production-question-bank-import:
    if: github.event_name == 'pull_request' && github.head_ref == 'ops/question-bank-production-import-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: question-bank-production-import
      cancel-in-progress: true
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_PDF_PREVIEW_BUCKET: ${{ secrets.R2_PDF_PREVIEW_BUCKET }}
      QUESTION_BANK_STORAGE_PROVIDER: r2
      EXPECTED_ZIP_SHA256: 1ad2401dd9e7ddc0c637683bf19359b048092bf8c05c550531ef1f32f3d8c568
      EXPECTED_ARCHIVE_FINGERPRINT: e91b6f5752b67626b278b34858ff0f11444bcb11bf0324e4cba1a5edad14a64d
      DRIVE_PART_00: 1h5K1OaUscnKUXSZ72ESuhyA27dknwxav
      DRIVE_PART_01: 1TncKdFerY0YQyW0-n54OjGw7H0pp-WQW
      DRIVE_PART_02: 16hcN_LpRD9JWDqw-MEFNAl_cnf-ge0fw
      ARCHIVE_PATH: /tmp/processed-20260721-222121.zip
      DRY_RUN_REPORT: /tmp/question-bank-dry-run.json
      IMPORT_REPORT: /tmp/question-bank-import.json
    steps:
      - name: Check out reviewed importer
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Validate protected configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$GOOGLE_SERVICE_ACCOUNT_EMAIL"
          test -n "$GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY"
          test -n "$R2_ACCOUNT_ID" || test -n "$R2_ENDPOINT"
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          test -n "$R2_PDF_PREVIEW_BUCKET"
      - name: Download private staged archive chunks
        run: |
          node --input-type=module <<'NODE'
          import { createWriteStream } from 'node:fs';
          import { stat } from 'node:fs/promises';
          import { pipeline } from 'node:stream/promises';
          import { google } from 'googleapis';
          const auth = new google.auth.JWT({
            email: process.env.GOOGLE_SERVICE_ACCOUNT_EMAIL,
            key: process.env.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY.replace(/\\n/g, '\n'),
            scopes: ['https://www.googleapis.com/auth/drive.readonly'],
          });
          const drive = google.drive({ version: 'v3', auth });
          const parts = [
            [process.env.DRIVE_PART_00, '/tmp/qb-part-00', 90000000],
            [process.env.DRIVE_PART_01, '/tmp/qb-part-01', 90000000],
            [process.env.DRIVE_PART_02, '/tmp/qb-part-02', 61545314],
          ];
          for (const [fileId, destination, expectedBytes] of parts) {
            const response = await drive.files.get(
              { fileId, alt: 'media', supportsAllDrives: true },
              { responseType: 'stream' },
            );
            await pipeline(response.data, createWriteStream(destination, { mode: 0o600 }));
            const metadata = await stat(destination);
            if (metadata.size !== expectedBytes) {
              throw new Error(`Staged chunk size mismatch: expected ${expectedBytes}, received ${metadata.size}`);
            }
          }
          NODE
      - name: Reassemble and verify exact ZIP
        shell: bash
        run: |
          set -euo pipefail
          cat /tmp/qb-part-00 /tmp/qb-part-01 /tmp/qb-part-02 > "$ARCHIVE_PATH"
          printf '%s  %s\n' "$EXPECTED_ZIP_SHA256" "$ARCHIVE_PATH" | sha256sum --check --strict
          unzip -tq "$ARCHIVE_PATH"
      - name: Verify private R2 request path with timeout
        run: |
          node --input-type=module <<'NODE'
          import { randomUUID } from 'node:crypto';
          import { deletePrivateR2Object, getPrivateR2Object, putPrivateR2Object } from './scripts/r2-s3.mjs';
          const key = `question-bank/preflight/${randomUUID()}.txt`;
          const signal = () => AbortSignal.timeout(30000);
          let uploaded = false;
          try {
            await putPrivateR2Object({
              bucket: process.env.R2_PDF_PREVIEW_BUCKET,
              key,
              body: Buffer.from('dp-question-bank-preflight'),
              contentType: 'text/plain',
              signal: signal(),
            });
            uploaded = true;
            const response = await getPrivateR2Object({
              bucket: process.env.R2_PDF_PREVIEW_BUCKET,
              key,
              signal: signal(),
            });
            if (!response.ok || (await response.text()) !== 'dp-question-bank-preflight') {
              throw new Error('R2 preflight read verification failed.');
            }
          } finally {
            if (uploaded) await deletePrivateR2Object({
              bucket: process.env.R2_PDF_PREVIEW_BUCKET,
              key,
              signal: signal(),
            });
          }
          NODE
      - name: Audit and normalize without production writes
        run: >-
          node scripts/import-question-bank.mjs
          --archive "$ARCHIVE_PATH"
          --mode dry-run
          --workers 6
          --storage-provider r2
          --storage-bucket "$R2_PDF_PREVIEW_BUCKET"
          --report "$DRY_RUN_REPORT"
      - name: Enforce reviewed archive fingerprint and counts
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const report = JSON.parse(await readFile(process.env.DRY_RUN_REPORT, 'utf8'));
          if (report.productionWritePerformed !== false) throw new Error('Dry run unexpectedly performed a production write.');
          if (report.verificationStatus !== 'passed') throw new Error('Archive verification did not pass.');
          if (report.archiveSha256 !== process.env.EXPECTED_ARCHIVE_FINGERPRINT) {
            throw new Error('Archive content fingerprint differs from the reviewed source.');
          }
          const expected = {
            datasets: 177, questionOccurrences: 12212, questionCores: 5135,
            variants: 12212, topics: 177, subtopics: 706,
            authoritativePlacements: 12895, fallbackPlacements: 2,
            storedPlacementRows: 12897, imageManifestRows: 4769,
            physicalImagePaths: 4663, contentDeduplicatedAssets: 4558,
            variantAssetAssociations: 11805, vimeoUrls: 6103,
            variantVideoAssociations: 14058, formulaBookletUrls: 18,
            crossDatasetCanonicalSubtopics: 596, blankQuestionOccurrences: 4,
          };
          for (const [key, value] of Object.entries(expected)) {
            if (report.actualCounts?.[key] !== value) {
              throw new Error(`Count mismatch for ${key}: expected ${value}, received ${report.actualCounts?.[key]}`);
            }
          }
          NODE
      - name: Import database rows and private R2 assets
        run: >-
          node scripts/import-question-bank.mjs
          --archive "$ARCHIVE_PATH"
          --mode all
          --storage-provider r2
          --storage-bucket "$R2_PDF_PREVIEW_BUCKET"
          --workers 4
          --batch-size 250
          --confirm-production
          --report "$IMPORT_REPORT"
      - name: Verify completed production import
        run: |
          node --input-type=module <<'NODE'
          import { readFile, appendFile } from 'node:fs/promises';
          const report = JSON.parse(await readFile(process.env.IMPORT_REPORT, 'utf8'));
          if (report.productionWritePerformed !== true) throw new Error('Importer did not record its production write.');
          if (report.databaseVerification?.status !== 'passed') throw new Error('Final database verification failed.');
          if (report.assetUpload?.failed !== 0) throw new Error('One or more R2 assets failed verification.');
          if (report.assetUpload?.uploaded + report.assetUpload?.skippedVerified !== 4558) {
            throw new Error('Verified R2 asset total does not equal 4,558.');
          }
          const counts = report.databaseVerification.counts;
          const expected = {
            datasets: 177, questionCores: 5135, variants: 12212,
            storedPlacementRows: 12897, contentDeduplicatedAssets: 4558,
            vimeoUrls: 6103,
          };
          for (const [key, value] of Object.entries(expected)) {
            if (counts?.[key] !== value) throw new Error(`Final count mismatch for ${key}.`);
          }
          await appendFile(process.env.GITHUB_STEP_SUMMARY, [
            '## Production question-bank import', '',
            '- Archive fingerprint: verified',
            '- Database verification: passed',
            `- R2 assets verified: ${report.assetUpload.uploaded + report.assetUpload.skippedVerified}`,
            '- Failed or pending assets: 0',
            '- Question cores: 5,135',
            '- Variants: 12,212',
            '- Stored placements: 12,897',
            '',
          ].join('\n'));
          NODE
      - name: Remove runner-local archive material
        if: always()
        shell: bash
        run: |
          rm -f /tmp/qb-part-00 /tmp/qb-part-01 /tmp/qb-part-02
          rm -f "$ARCHIVE_PATH" "$DRY_RUN_REPORT" "$IMPORT_REPORT"

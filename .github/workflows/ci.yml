name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Audit production dependencies
        run: |
          npm audit --omit=dev --json > /tmp/npm-audit.json || true
          node <<'NODE'
          const report = require('/tmp/npm-audit.json');
          const rows = Object.entries(report.vulnerabilities || {}).map(([name, value]) => ({
            name,
            severity: value.severity,
            direct: value.isDirect,
            via: (value.via || []).map((item) => typeof item === 'string' ? item : `${item.title} (${item.url})`),
            range: value.range,
            fixAvailable: value.fixAvailable,
            nodes: value.nodes,
          }));
          console.log(JSON.stringify({ metadata: report.metadata, vulnerabilities: rows }, null, 2));
          const counts = report.metadata?.vulnerabilities || {};
          if ((counts.high || 0) + (counts.critical || 0) > 0) process.exit(1);
          NODE

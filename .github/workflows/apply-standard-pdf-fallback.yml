name: Apply standard PDF fallback patch

on:
  push:
    branches:
      - fix/standard-pdf-fallback

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/standard-pdf-fallback
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/patch-standard-pdf-fallback.py
      - run: |
          rm scripts/patch-standard-pdf-fallback.py
          rm .github/workflows/apply-standard-pdf-fallback.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/resource/'[fileId]'/pdf-viewer.tsx scripts/patch-standard-pdf-fallback.py .github/workflows/apply-standard-pdf-fallback.yml
          git commit -m "Restore standard PDF fallback for unprepared files"
          git push origin HEAD:fix/standard-pdf-fallback

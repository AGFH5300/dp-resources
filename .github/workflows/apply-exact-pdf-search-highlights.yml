name: Apply exact PDF search highlights

on:
  push:
    branches:
      - feat/pdf-exact-search-highlights

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pdf-exact-search-highlights
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/apply-exact-pdf-search-highlights.py
      - run: |
          rm scripts/apply-exact-pdf-search-highlights.py
          rm .github/workflows/apply-exact-pdf-search-highlights.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/resource/'[fileId]'/pdf-viewer.tsx \
            app/api/resource/'[fileId]'/pdf-preview/search/route.ts \
            app/api/resource/'[fileId]'/pdf-preview/manifest/route.ts \
            app/api/resource/'[fileId]'/pdf-preview/status/route.ts \
            lib/pdf-preview-derivatives.ts \
            scripts/pdf-preview-worker.mjs \
            scripts/prepare-pdf-preview.mjs \
            scripts/prepare-pdf-previews-batch.mjs \
            supabase/migrations/20260714220000_pdf_preview_exact_search_geometry.sql \
            tests/pdf-progressive-loader.test.ts \
            scripts/apply-exact-pdf-search-highlights.py \
            .github/workflows/apply-exact-pdf-search-highlights.yml
          git commit -m "Highlight exact PDF search matches"
          git push origin HEAD:feat/pdf-exact-search-highlights

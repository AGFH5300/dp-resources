name: Diagnose exact PDF search

on:
  push:
    branches:
      - feat/pdf-exact-search-highlights-v2

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pdf-exact-search-highlights-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: |
          set +e
          npm run typecheck > exact-pdf-search-typecheck.txt 2>&1
          echo "exit_status=$?" >> exact-pdf-search-typecheck.txt
      - run: |
          rm .github/workflows/diagnose-exact-pdf-search.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exact-pdf-search-typecheck.txt .github/workflows/diagnose-exact-pdf-search.yml
          git commit -m "Capture exact PDF search typecheck diagnostic"
          git push origin HEAD:feat/pdf-exact-search-highlights-v2

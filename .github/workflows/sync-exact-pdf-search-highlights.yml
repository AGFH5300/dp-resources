name: Sync exact PDF search highlights

on:
  push:
    branches:
      - feat/pdf-exact-search-highlights-v2

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/pdf-exact-search-highlights-v2
          fetch-depth: 0
      - run: git fetch origin feat/pdf-exact-search-highlights
      - run: |
          git checkout origin/feat/pdf-exact-search-highlights -- \
            app/api/resource/'[fileId]'/pdf-preview/manifest/route.ts \
            app/api/resource/'[fileId]'/pdf-preview/search/route.ts \
            app/api/resource/'[fileId]'/pdf-preview/status/route.ts \
            app/resource/'[fileId]'/pdf-viewer.tsx \
            lib/pdf-preview-derivatives.ts \
            scripts/pdf-preview-worker.mjs \
            scripts/prepare-pdf-preview.mjs \
            scripts/prepare-pdf-previews-batch.mjs \
            supabase/migrations/20260714220000_pdf_preview_exact_search_geometry.sql \
            tests/pdf-progressive-loader.test.ts
          rm .github/workflows/sync-exact-pdf-search-highlights.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/resource/'[fileId]'/pdf-preview/manifest/route.ts \
            app/api/resource/'[fileId]'/pdf-preview/search/route.ts \
            app/api/resource/'[fileId]'/pdf-preview/status/route.ts \
            app/resource/'[fileId]'/pdf-viewer.tsx \
            lib/pdf-preview-derivatives.ts \
            scripts/pdf-preview-worker.mjs \
            scripts/prepare-pdf-preview.mjs \
            scripts/prepare-pdf-previews-batch.mjs \
            supabase/migrations/20260714220000_pdf_preview_exact_search_geometry.sql \
            tests/pdf-progressive-loader.test.ts \
            .github/workflows/sync-exact-pdf-search-highlights.yml
          git commit -m "Highlight exact PDF search words and phrases"
          git push origin HEAD:feat/pdf-exact-search-highlights-v2

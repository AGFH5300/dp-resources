name: PDF preview diagnostics

on:
  push:
    branches:
      - feat/batch-textbook-pdf-previews

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Run tests and capture output
        shell: bash
        run: |
          set -o pipefail
          npm test -- --reporter=verbose 2>&1 | tee pdf-test-output.txt
      - name: Post sanitized failure extract
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          sed -E 's/\x1B\[[0-9;]*[mK]//g' pdf-test-output.txt > pdf-test-clean.txt
          {
            echo "Temporary PDF-preview test diagnostic (this comment will be removed after the fix):"
            echo
            echo '```text'
            grep -E -A 10 -B 4 'FAIL|AssertionError|expected|Test Files|Tests[[:space:]]' pdf-test-clean.txt | tail -n 100 || tail -n 60 pdf-test-clean.txt
            echo '```'
          } > pdf-test-comment.md
          gh pr comment 82 --body-file pdf-test-comment.md
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-test-output
          path: pdf-test-output.txt
          if-no-files-found: error

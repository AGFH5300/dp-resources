name: PDF preview diagnostics

on:
  push:
    branches:
      - feat/batch-textbook-pdf-previews

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Run tests and capture output
        shell: bash
        run: |
          set -o pipefail
          npm test -- --reporter=verbose 2>&1 | tee pdf-test-output.txt
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-test-output
          path: pdf-test-output.txt
          if-no-files-found: error

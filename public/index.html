<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DP Resources</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Secure resource portal</p>
      <h1>DP Resources</h1>
      <p>Approved users can browse resources, open previews, and start downloads through protected backend routes.</p>
      <label>Demo user
        <select id="demo-user">
          <option value="new@example.com">New unapproved user</option>
          <option value="user@example.com">Approved user</option>
          <option value="admin@example.com">Admin user</option>
        </select>
      </label>
    </section>

    <section id="status" class="card"></section>
    <section id="library" class="grid"></section>
    <section id="profile" class="card"></section>
    <section id="admin" class="card"></section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
